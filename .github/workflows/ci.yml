name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Typecheck
      run: npm run typecheck
      
    - name: Lint
      run: npm run lint
      
    - name: Run Unit Tests
      run: npm run test:coverage
      
    - name: Build
      run: npm run build
      env:
        # Mock env vars for successful build
        VITE_FIREBASE_API_KEY: "mock"
        VITE_FIREBASE_AUTH_DOMAIN: "mock"
        VITE_FIREBASE_PROJECT_ID: "mock"
        VITE_FIREBASE_STORAGE_BUCKET: "mock"
        VITE_FIREBASE_MESSAGING_SENDER_ID: "mock"
        VITE_FIREBASE_APP_ID: "mock"
        VITE_GA_MEASUREMENT_ID: "mock"
        VITE_GEMINI_API_KEY: "mock"
